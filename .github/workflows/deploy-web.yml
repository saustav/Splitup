name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_WEB_URL: https://splitup.mantradigital.com.np

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build web
        run: npm run build:web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_AUTH_REDIRECT_ORIGIN: ${{ env.APP_WEB_URL }}

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Ensure Apache config is in dist
        run: |
          cp public/.htaccess dist/.htaccess
          test -f dist/.htaccess
          echo "dist/.htaccess ready for deploy"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "SSH_HOST=${{ secrets.SSH_HOST }}"
          echo "SSH_PORT=${{ secrets.SSH_PORT }}"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>&1 || echo "ssh-keyscan failed"

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            dist/ \
            ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:/home/u461920479/domains/mantradigital.com.np/public_html/splitup/
